<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stack | Nathan Maneth Fernando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap');
        
        body { background-color: #08080a; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; margin: 0; overflow-x: hidden; width: 100%; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }

        #page-loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #08080a; z-index: 10001; opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in-out; }
        .blur-exit { filter: blur(20px) scale(1.1); opacity: 0; transition: all 0.6s ease-in; }

        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; background-image: radial-gradient(circle at 1px, #1e293b 1px, transparent 1px); background-size: 40px 40px; }
        
        .shimmer-text { background: linear-gradient(to right, #4f46e5 0%, #ffffff 50%, #4f46e5 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

        .sub-nav-btn { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); 
            padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 1px; transition: 0.3s; display: flex; align-items: center; gap: 8px; color: #94a3b8;
        }
        .sub-nav-btn.active { background: rgba(79, 70, 229, 0.2); border-color: #4f46e5; color: #fff; }
        .sub-nav-btn:hover { border-color: rgba(79, 70, 229, 0.6); transform: translateY(-2px); }

        .tech-card { 
            background: rgba(17, 24, 39, 0.4); border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 20px; padding: 2rem 1rem; text-align: center; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .tech-card:hover { 
            background: rgba(79, 70, 229, 0.1); border-color: #4f46e5; 
            transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .tech-card i { transition: transform 0.4s ease; }
        .tech-card:hover i { transform: scale(1.2); }

        .reveal-element { opacity: 0; transform: translateY(30px); transition: all 0.8s ease forwards; }
        .start-reveal { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div id="page-loader-overlay"></div>
    <div id="particles-js"></div>

    <nav id="navbar" class="fixed top-8 w-full z-50 flex justify-center px-4">
        <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 px-8 py-4 rounded-full flex gap-8 text-xs uppercase tracking-widest font-bold text-gray-400 shadow-2xl">
            <a href="index.html" class="hover:text-indigo-400 transition transition-link">Home</a>
            <a href="about.html" class="hover:text-indigo-400 transition transition-link">About</a>
            <a href="portfolio.html" class="hover:text-indigo-400 transition transition-link">Portfolio</a>
            <a href="contact.html" class="hover:text-indigo-400 transition transition-link">Contact</a>
        </div>
    </nav>

    <main id="main-content" class="relative min-h-screen px-4 md:px-8 max-w-7xl mx-auto pt-32 pb-24">
        <header class="text-center mb-12 reveal-element">
            <h1 class="heading-font text-5xl md:text-7xl font-bold mb-4">Tech <span class="shimmer-text">Stack</span></h1>
            <p class="text-gray-400 max-w-2xl mx-auto">The tools, languages, and technologies I use to bring digital ideas to life.</p>
        </header>

        <div class="flex flex-wrap justify-center gap-4 mb-20 reveal-element">
            <a href="portfolio.html" class="sub-nav-btn transition-link"><i class="fas fa-project-diagram"></i> Projects</a>
            <a href="certificates.html" class="sub-nav-btn transition-link"><i class="fas fa-certificate"></i> Certificates</a>
            <a href="techstack.html" class="sub-nav-btn active transition-link"><i class="fas fa-layer-group"></i> Tech Stack</a>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <div class="tech-card reveal-element" style="transition-delay: 0.1s;">
                <i class="fab fa-python text-5xl text-yellow-500 mb-4"></i>
                <p class="font-bold">Python</p>
            </div>
            <div class="tech-card reveal-element" style="transition-delay: 0.15s;">
                <i class="fab fa-java text-5xl text-red-500 mb-4"></i>
                <p class="font-bold">Java</p>
            </div>
            <div class="tech-card reveal-element" style="transition-delay: 0.2s;">
                <i class="fab fa-js text-5xl text-yellow-300 mb-4"></i>
                <p class="font-bold">JavaScript</p>
            </div>
            <div class="tech-card reveal-element" style="transition-delay: 0.25s;">
                <i class="fas fa-code text-5xl text-blue-500 mb-4"></i>
                <p class="font-bold">C++</p>
            </div>

            <div class="tech-card reveal-element" style="transition-delay: 0.3s;">
                <i class="fab fa-react text-5xl text-blue-400 mb-4"></i>
                <p class="font-bold">React</p>
            </div>
            <div class="tech-card reveal-element" style="transition-delay: 0.35s;">
                <i class="fab fa-html5 text-5xl text-orange-600 mb-4"></i>
                <p class="font-bold">HTML5</p>
            </div>
            <div class="tech-card reveal-element" style="transition-delay: 0.4s;">
                <i class="fab fa-css3-alt text-5xl text-blue-600 mb-4"></i>
                <p class="font-bold">CSS3</p>
            </div>
            <div class="tech-card reveal-element" style="transition-delay: 0.45s;">
                <i class="fab fa-node-js text-5xl text-green-500 mb-4"></i>
                <p class="font-bold">Node.js</p>
            </div>

            <div class="tech-card reveal-element" style="transition-delay: 0.5s;">
                <i class="fas fa-database text-5xl text-emerald-400 mb-4"></i>
                <p class="font-bold">SQL / MySQL</p>
            </div>
            <div class="tech-card reveal-element" style="transition-delay: 0.55s;">
                <i class="fab fa-github text-5xl text-white mb-4"></i>
                <p class="font-bold">GitHub</p>
            </div>
            <div class="tech-card reveal-element" style="transition-delay: 0.6s;">
                <i class="fab fa-figma text-5xl text-purple-400 mb-4"></i>
                <p class="font-bold">Figma</p>
            </div>
            <div class="tech-card reveal-element" style="transition-delay: 0.65s;">
                <i class="fas fa-network-wired text-5xl text-blue-300 mb-4"></i>
                <p class="font-bold">Cisco Packet Tracer</p>
            </div>
            <div class="tech-card reveal-element" style="transition-delay: 0.7s;">
                <i class="fab fa-android text-5xl text-green-400 mb-4"></i>
                <p class="font-bold">Android Studio</p>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('load', () => document.querySelectorAll('.reveal-element').forEach(el => el.classList.add('start-reveal')));
        
        document.querySelectorAll('.transition-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href.includes('.html')) {
                    e.preventDefault();
                    document.getElementById('main-content').classList.add('blur-exit');
                    document.getElementById('navbar').classList.add('blur-exit');
                    document.getElementById('page-loader-overlay').style.opacity = '1';
                    setTimeout(() => window.location.href = href, 500);
                }
            });
        });

        particlesJS("particles-js", { 
            "particles": { 
                "number": { "value": 40, "density": { "enable": true, "value_area": 800 } }, 
                "color": { "value": "#6366f1" }, 
                "opacity": { "value": 0.2 }, 
                "size": { "value": 2 }, 
                "line_linked": { "enable": true, "opacity": 0.05, "distance": 150 }, 
                "move": { "enable": true, "speed": 1 } 
            }, 
            "retina_detect": true 
        });
    </script>
</body>
</html>
